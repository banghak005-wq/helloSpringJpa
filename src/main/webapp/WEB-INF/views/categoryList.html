<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 목록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #e67e22; padding-bottom: 10px; color: #2c3e50; }
        .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
        .back-btn:hover { background: #545b62; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; border: 1px solid #ced4da; text-align: left; }
        th { background: #f8f9fa; }
        .btn-submit { background: #e74c3c; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
        .btn-submit:hover { background: #c0392b; }
        .success { color: #27ae60; font-weight: bold; }
        .error { color: #e74c3c; font-weight: bold; }
        footer { margin-top: 40px; font-size: 0.85em; color: #6c757d; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>카테고리 목록</h1>
    <a href="/categories/create" class="back-btn">+ 카테고리 등록</a>
    <a href="/products" class="back-btn">상품 목록으로</a>

    <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>카테고리명</th>
                <th>삭제</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.id}"></td>
                <td th:text="${cat.name}"></td>
                <td>
                    <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                        <button type="submit" class="btn-submit">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <footer>
        <p>
            실습 수행 일시: 
            <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss', new java.util.Locale('ko', 'KR'))}"></span>
            | 학번: 2191045 | 성명: 백인서
        </p>
    </footer>
</body>
</html>
